{% extends "base.html" %}
{% load static %}

{% block content %}
<body>
    
    <div class="container">
        <div class="row">
            <form action="" method="POST">
            {% csrf_token %}
            <div id="in_meal">
                <h3>List of foods in meal {{meal_name}}</h3>
            </div>
            <button type="submit" id="meal_name_button">Go to meal page</button>
    {% for food in foods %}
    <!-- col-12-4 from bootstrap -->    
    <div class="col-2">
        {% if "placeholder" in food.featured_image.url %}
        <img class="card-img-top" src="{% static 'images/fruit_bowl.jpg' %}"
        alt="placeholder image">
        {% else %}
        <!-- food.featured_image.url images are from pinterest -->
        <img class="card-img-top scale" src=" {{ food.featured_image.url }}"
            alt="{{ food.name }}">
    {% endif %}
    <p>food add page {{ food.name }} </p>
    <!-- btn-success btn-danger classes from bootstrap used for add and delete buttons  -->
    <button type="button" id="add{{food.name}}" class="btn btn-success">Add</button>
    <button type="button" id="del{{food.name}}" class="btn btn-danger">Delete</button>
    </div>
    {% endfor %}
    </form>
        </div>
    </div>
</body>
<!-- custom javascript -->
<script src="../static/js/script.js"></script>
{% endblock %}

</html>
