{% extends "base.html" %}
{% load static %}

{% block content %}

<h1>Meal Update for {{meal_name}}</h1>
<p><a href="/meal_list">[Back to Meals]</a>&nbsp;<a href="/hello/{{meal_id}}">[Add Foods]</a></p>

<form action="" method="POST">

    Update list:<input type="text" name="update_list" id="update_list" /><br /><br />
    <!-- <input type="text" name="item_list" id="item_list" value="{{ item_list }}" /> -->

    <ul>
    {% for item in item_list %}
        <li>
            {{item.id}}-&nbsp;
            {{item.food__food_name}}-&nbsp;
            <input type="Text" id="mass{{item_id}}" name="mass{{item_id}}" value="{{ item.mass }}"   >
            <a href="/meal_item_delete/{{item.id}}">[Delete]</a>&nbsp;
        </li>
    {% endfor %}
    </ul>
    <input type="submit" value="Submit"><br /><br />
    Potassium:{{potassium}}<br />
</form>
{% endblock %}
