{% extends "base.html" %}
{% load static %}

{% block content %}

<h1>Meal List</h1>
<p><a href="/meal_create">[Create New Meal]</a></p>

<ul>
  {% for meal in meal_results %}
    <li>
        {{meal.id}}&nbsp;
        {{meal.name}}&nbsp;
        <a href="/meal_update/{{meal.id}}">[Edit]</a>&nbsp;
        <a href="/meal_delete/{{meal.id}}">[Delete]</a>&nbsp;
    </li>
  {% endfor %}
</ul>
{% endblock %}
