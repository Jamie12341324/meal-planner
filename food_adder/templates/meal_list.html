{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container" id="background_meal_list">
    <div class="row">
        <div class="standard col-12">
          <h1>Meal List</h1>
          <p><a href="/meal_create" class="btn btn-success">Create New Meal</a></p>

          <table class="standard">
            <tr>
              <th> Meal name</th>
              <th> Edit </th>
              <th> Rename </th>
              <th> Delete</th>
            </tr>
            {% for meal in meal_results %}
              <tr>
                  <td class="padding4">{{meal.name}}</td>&nbsp;
                  <td class="padding4"><a href="/meal_update/{{meal.id}}" class="btn btn-success">Edit</a></td>&nbsp;
                  <td class="padding4"><a href="/meal_create2/{{meal.id}}" class="btn btn-success">Rename</a></td>&nbsp;
                  <td class="padding4"><a href="/meal_delete/{{meal.id}}" class="btn btn-danger">Delete</a></td>&nbsp;
              </tr>
            {% endfor %}
            </table>
        </div>
    </div>
</div>
{% endblock %}
